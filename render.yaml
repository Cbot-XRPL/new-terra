# Render blueprint — `render.yaml` at the repo root tells Render what to
# create when you click "Connect" on the repository.
#
# This sets up:
#   1. A managed PostgreSQL database
#   2. A web service that builds the Docker image and serves the API + SPA
#
# Image uploads are written to /app/server/uploads inside the container; this
# is on a persistent disk so they survive deploys. Switch to S3 once you
# outgrow a single disk (see server/src/lib/storage.ts).
services:
  - type: web
    name: new-terra
    runtime: docker
    dockerfilePath: ./server/Dockerfile
    plan: starter
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: new-terra-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: APP_URL
        sync: false      # set this to your Render URL after first deploy
      - key: SEED_ADMIN_EMAIL
        sync: false
      - key: SEED_ADMIN_PASSWORD
        sync: false
      - key: SEED_ADMIN_NAME
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: INQUIRY_TO
        sync: false
    disk:
      name: uploads
      mountPath: /app/server/uploads
      sizeGB: 5

databases:
  - name: new-terra-db
    plan: starter
    postgresMajorVersion: 16
